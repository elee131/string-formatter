<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bullet Formatter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }
    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    pre {
      background: white;
      padding: 15px;
      white-space: pre-wrap;
      border: 1px solid #ddd;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>Bullet Formatter</h2>
  <div style="background: #fff; padding: 12px; border: 1px solid #ddd; margin-bottom: 15px;">
  <h3>How to use</h3>
  <p>
    Write normal text, then include bullet points inside curly braces <code>{ }</code>.
  </p>

  <p><b>Use this format:</b></p>
  <code>{ point 1 &lt;&gt; point 2 &lt;&gt; point 3 }</code>

  <p><b>Example:</b></p>
  <code>
    This is a sentence. Here are items: { apples &lt;&gt; bananas &lt;&gt; oranges }
  </code>

  <p><b>Output:</b></p>
  <code>
    - apples<br/>
    - bananas<br/>
    - oranges
  </code>
</div>

  <textarea id="input" placeholder="Paste your text here..."></textarea>
  <button onclick="formatText()">Format</button>

  <pre id="output"></pre>

  <script>
    function formatText() {
      const input = document.getElementById("input").value;

      const result = input.replace(/\{(.*?)\}/g, (match, inner) => {
        const parts = inner
          .split("<>")
          .map(p => p.trim())
          .filter(p => p.length > 0);

        return "\n" + parts.map(p => `- ${p}`).join("\n");
      });

      document.getElementById("output").textContent = result;
    }
  </script>

</body>
</html>
