<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bullet Formatter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }

    textarea {
      width: 100%;
      height: 180px;
      margin: 10px 0;
      padding: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    select {
      padding: 6px;
      margin-left: 8px;
    }

    pre {
      background: white;
      padding: 15px;
      white-space: pre-wrap;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .box {
      background: #fff;
      padding: 12px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
      border-radius: 6px;
    }

    code {
      background: #f0f0f0;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <h2>Bullet Formatter</h2>

  <div class="box">
    <h3>How it works</h3>
    <p>
      Only lines starting with <code>-</code> are converted into bullet groups.
    </p>
    <p>
      Bullet groups are wrapped in <code>{ }</code> and separated by <code>|</code>.
    </p>
    <p>Paragraphs are preserved automatically.</p>
  </div>

  <label>
    Mode:
    <select id="mode">
      <option value="forward">Text → { bullets }</option>
      <option value="reverse">{ bullets } → Text</option>
    </select>
  </label>

  <textarea id="input" placeholder="Paste your text here..."></textarea>

  <button onclick="formatText()">Convert</button>

  <pre id="output"></pre>

  <script>
    function formatText() {
      const mode = document.getElementById("mode").value;
      const input = document.getElementById("input").value;

      let result = "";

      // -------------------------
      // FORWARD: text → { bullets }
      // -------------------------
      if (mode === "forward") {
        const lines = input.split("\n");

        let output = [];
        let bulletBuffer = [];

        function flushBullets() {
          if (bulletBuffer.length > 0) {
            const cleaned = bulletBuffer.map(b =>
              b.replace(/^\s*[-•*]\s*/, "").trim()
            );
            output.push(`{ ${cleaned.join(" | ")} }`);
            bulletBuffer = [];
          }
        }

        for (let line of lines) {
          const trimmed = line.trim();

          if (!trimmed) {
            flushBullets();
            output.push("");
            continue;
          }

          if (/^\s*[-•*]\s*/.test(trimmed)) {
            bulletBuffer.push(trimmed);
          } else {
            flushBullets();
            output.push(line);
          }
        }

        flushBullets();
        result = output.join("\n");
      }

      // -------------------------
      // REVERSE: { bullets } → text
      // -------------------------
      if (mode === "reverse") {
        const match = input.match(/\{(.*?)\}/s);

        if (!match) {
          result = input;
        } else {
          const before = input.split("{")[0];
          const after = input.split("}")[1] || "";

          const items = match[1]
            .split("|")
            .map(p => p.trim())
            .filter(Boolean);

          result =
            before.trim() +
            "\n\n" +
            items.map(i => "- " + i).join("\n") +
            "\n\n" +
            after.trim();
        }
      }

      document.getElementById("output").textContent = result;
    }
  </script>

</body>
</html>
